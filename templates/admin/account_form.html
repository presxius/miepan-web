{% extends "base.html" %}
{% block title %}{{ 'Edit' if account else 'Tambah' }} Akun Admin{% endblock %}

{% block content %}
{% set active = 'accounts' %}
{% include "admin/_nav.html" with context %}

<h2>{{ 'Edit' if account else 'Tambah' }} Akun Admin</h2>

<form method="post" class="card">
    {% if not account %}
    <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required>
    </div>
    {% endif %}
    <div class="form-group">
        <label for="nama_lengkap">Nama Lengkap</label>
        <input type="text" id="nama_lengkap" name="nama_lengkap" value="{{ account.nama_lengkap if account else '' }}">
    </div>
    <div class="form-group">
        <label for="password">Password {{ '(kosongkan jika tidak ganti)' if account else '' }}</label>
        <input type="password" id="password" name="password" {{ 'required' if not account else '' }}>
    </div>
    <div class="form-group">
        <label for="akses_level">Level Akses</label>
        <select id="akses_level" name="akses_level">
            <option value="admin" {{ 'selected' if account and account.akses_level=='admin' }}>Admin</option>
            <option value="kepala_admin" {{ 'selected' if account and account.akses_level=='kepala_admin' }}>Superadmin</option>
        </select>
    </div>
    <button type="submit" class="btn btn-block">Simpan</button>
</form>
{% endblock %}
